<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simon Says — Simple Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Simon Says</h1>
      <p class="subtitle">Repeat the sequence — how far can you go?</p>
    </header>
    <section class="game">
      <div class="board">
        <button class="pad pad-green" data-color="0" aria-label="green pad"></button>
        <button class="pad pad-red" data-color="1" aria-label="red pad"></button>
        <button class="pad pad-yellow" data-color="2" aria-label="yellow pad"></button>
        <button class="pad pad-blue" data-color="3" aria-label="blue pad"></button>
      </div>
      <aside class="controls">
        <div class="display">
          <div>Level</div>
          <div id="level">--</div>
        </div>
        <div class="buttons">
          <button id="start">Start</button>
          <button id="strict" title="Strict: a mistake restarts the game">Strict: Off</button>
          <button id="reset">Reset</button>
        </div>
        <div id="message" class="message" aria-live="polite"></div>
      </aside>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
